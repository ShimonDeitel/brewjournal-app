name: Brewlog - Coffee Journal
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Brewlog-CoffeeJournal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-CoffeeJournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coffeelog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Brewlog-CoffeeJournal/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Brewlog-CoffeeJournal/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  Brewlog-CoffeeJournalTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-CoffeeJournalTests
    dependencies:
      - target: Brewlog-CoffeeJournal
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  Brewlog-CoffeeJournalUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-CoffeeJournalUITests
    dependencies:
      - target: Brewlog-CoffeeJournal
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Brewlog-CoffeeJournal:
    build:
      targets:
        Brewlog-CoffeeJournal: all
    test:
      targets:
        - Brewlog-CoffeeJournalTests
        - Brewlog-CoffeeJournalUITests
    run:
      config: Debug
