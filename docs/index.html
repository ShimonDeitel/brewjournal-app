<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brewlog - Coffee Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#160F0A; color:#f2f2f2; font-family: -apple-system, Helvetica, Arial, sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:32px; }
  h1 { font-size:2.2rem; margin-bottom:0.4rem; color:#8B5A2B; }
  p { line-height:1.6; opacity:0.85; }
  .cta { display:inline-block; margin-top:24px; padding:12px 28px; border-radius:999px;
          background:#8B5A2B; color:#fff; text-decoration:none; font-weight:600; }
  footer { margin-top:48px; font-size:0.8rem; opacity:0.5; }
  a { color:#8B5A2B; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8B5A2B55 0%, #8B5A2B00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Brewlog - Coffee Journal</h1>
  <p>Track coffee beans and brews tried with flavor notes.</p>
  <p>Add brew with origin, method, rating. Upgrade to Pro for origin stats, brew-method comparison.</p>
  <a class="cta" href="#">Available on the App Store soon</a>
  <footer>
    <a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a> &middot; s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
